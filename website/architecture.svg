<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 860" width="1100" height="860" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#172334"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2e42"/>
      <stop offset="100%" style="stop-color:#142030"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#38bdf8"/>
    </marker>
    <marker id="ap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#f472b6"/>
    </marker>
    <marker id="at" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#2dd4bf"/>
    </marker>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0L0 0 0 44" fill="none" stroke="#fff" stroke-width="0.4" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- BG -->
  <rect width="1100" height="860" fill="url(#bg)" rx="16"/>
  <rect width="1100" height="860" fill="url(#grid)" rx="16"/>

  <!-- TITLE -->
  <text x="550" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#f0f6ff" letter-spacing="2.5">AWS CLOUD RESUME CHALLENGE</text>
  <text x="550" y="67" text-anchor="middle" font-size="12" fill="#38bdf8" letter-spacing="4">ARCHITECTURE OVERVIEW</text>
  <line x1="300" y1="78" x2="800" y2="78" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>

  <!-- ═══════════════════════════════════════════
       USER  cx=550  x=450 y=94 w=200 h=72
  ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="450" y="94" width="200" height="72" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="1.5"/>
  </g>
  <!-- icon: browser -->
  <rect x="465" y="106" width="40" height="40" rx="7" fill="#0369a1"/>
  <rect x="470" y="111" width="30" height="20" rx="2" fill="none" stroke="#fff" stroke-width="1.6"/>
  <line x1="470" y1="117" x2="500" y2="117" stroke="#fff" stroke-width="1.6"/>
  <circle cx="474" cy="114" r="1.6" fill="#f87171"/>
  <circle cx="479" cy="114" r="1.6" fill="#fbbf24"/>
  <circle cx="484" cy="114" r="1.6" fill="#4ade80"/>
  <line x1="473" y1="122" x2="497" y2="122" stroke="#fff" stroke-width="1.1" opacity="0.55"/>
  <line x1="473" y1="126" x2="493" y2="126" stroke="#fff" stroke-width="1.1" opacity="0.55"/>
  <!-- text -->
  <text x="519" y="122" font-size="13" font-weight="700" fill="#f0f6ff">User</text>
  <text x="519" y="139" font-size="10" fill="#7fb3d3">Browser Request</text>
  <text x="519" y="156" font-size="9.5" fill="#38bdf8">resume.kevinlutes.com</text>

  <!-- Arrow User → Route 53 -->
  <line x1="550" y1="166" x2="550" y2="200" stroke="#38bdf8" stroke-width="2" marker-end="url(#ab)" opacity="0.85"/>
  <text x="558" y="186" font-size="9" fill="#38bdf8" opacity="0.65">DNS query</text>

  <!-- ═══════════════════════════════════════════
       ROUTE 53  cx=550  x=395 y=202 w=310 h=82
  ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="395" y="202" width="310" height="82" rx="12" fill="url(#card)" stroke="#a78bfa" stroke-width="1.5"/>
  </g>
  <!-- icon: Route 53 — purple square + "53" badge -->
  <rect x="410" y="217" width="40" height="40" rx="7" fill="#7c3aed"/>
  <text x="430" y="232" text-anchor="middle" font-size="9" font-weight="800" fill="#fff" letter-spacing="0">Route</text>
  <text x="430" y="247" text-anchor="middle" font-size="14" font-weight="900" fill="#fff">53</text>
  <!-- text -->
  <text x="464" y="230" font-size="13" font-weight="700" fill="#f0f6ff">Amazon Route 53</text>
  <text x="464" y="248" font-size="10" fill="#c4b5fd">DNS Resolution &amp; Routing</text>
  <text x="464" y="266" font-size="10" fill="#7fb3d3">Hosted Zone · A Alias → CloudFront</text>

  <!-- Arrow Route 53 → CloudFront -->
  <line x1="550" y1="284" x2="550" y2="318" stroke="#38bdf8" stroke-width="2" marker-end="url(#ab)" opacity="0.85"/>
  <text x="558" y="304" font-size="9" fill="#38bdf8" opacity="0.65">HTTPS</text>

  <!-- ═══════════════════════════════════════════
       CLOUDFRONT  cx=545  x=355 y=320 w=380 h=84
  ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="355" y="320" width="380" height="84" rx="12" fill="url(#card)" stroke="#fb923c" stroke-width="1.5"/>
  </g>
  <!-- icon: CloudFront — orange square + globe with arrows -->
  <rect x="371" y="334" width="40" height="40" rx="7" fill="#c2410c"/>
  <circle cx="391" cy="354" r="11" fill="none" stroke="#fff" stroke-width="1.6"/>
  <ellipse cx="391" cy="354" rx="5.5" ry="11" fill="none" stroke="#fff" stroke-width="1.1"/>
  <line x1="380" y1="354" x2="402" y2="354" stroke="#fff" stroke-width="1.1"/>
  <!-- text -->
  <text x="425" y="342" font-size="13" font-weight="700" fill="#f0f6ff">Amazon CloudFront</text>
  <text x="425" y="360" font-size="10" fill="#fdba74">CDN + HTTPS Termination</text>
  <text x="425" y="378" font-size="10" fill="#7fb3d3">Global Edge Network · OAC to S3</text>

  <!-- ═══════════════════════════════════════════
       ACM  x=748 y=320 w=128 h=84
       (right of CloudFront, ends at 876)
  ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="752" y="320" width="130" height="84" rx="12" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="6,3"/>
  </g>
  <!-- icon: ACM — teal square + lock -->
  <rect x="762" y="332" width="34" height="34" rx="6" fill="#0f766e"/>
  <rect x="769" y="341" width="20" height="15" rx="3" fill="none" stroke="#fff" stroke-width="1.7"/>
  <path d="M772 341 Q772 334 779 334 Q786 334 786 341" fill="none" stroke="#fff" stroke-width="1.7"/>
  <circle cx="779" cy="349.5" r="2.2" fill="#fff"/>
  <!-- text -->
  <text x="804" y="340" font-size="10" font-weight="700" fill="#2dd4bf">AWS ACM</text>
  <text x="804" y="356" font-size="9.5" fill="#f0f6ff">SSL Certificate</text>
  <text x="804" y="371" font-size="9" fill="#7fb3d3">TLS · us-east-1</text>
  <text x="804" y="386" font-size="9" fill="#7fb3d3">*.kevinlutes.com</text>
  <!-- dashed line ACM left edge → CloudFront right edge -->
  <line x1="752" y1="362" x2="737" y2="362" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#at)" opacity="0.9"/>

  <!-- Arrows CF → S3 and CF → Lambda -->
  <!-- CF bottom-left area  ~x=430 → S3 top cx=370 -->
  <line x1="430" y1="404" x2="370" y2="470" stroke="#38bdf8" stroke-width="2" marker-end="url(#ab)" opacity="0.85"/>
  <!-- CF bottom-right area ~x=660 → Lambda top cx=880 -->
  <line x1="660" y1="404" x2="870" y2="470" stroke="#38bdf8" stroke-width="2" marker-end="url(#ab)" opacity="0.85"/>

  <!-- ═══════════════════════════════════════════
       S3  cx=370  x=240 y=472 w=260 h=90
  ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="240" y="472" width="260" height="90" rx="12" fill="url(#card)" stroke="#4ade80" stroke-width="1.5"/>
  </g>
  <!-- icon: S3 — green square + bucket -->
  <rect x="255" y="486" width="40" height="40" rx="7" fill="#166534"/>
  <ellipse cx="275" cy="498" rx="11" ry="4.5" fill="none" stroke="#fff" stroke-width="1.7"/>
  <line x1="264" y1="498" x2="264" y2="516" stroke="#fff" stroke-width="1.7"/>
  <line x1="286" y1="498" x2="286" y2="516" stroke="#fff" stroke-width="1.7"/>
  <ellipse cx="275" cy="516" rx="11" ry="4.5" fill="#fff" opacity="0.2" stroke="#fff" stroke-width="1.7"/>
  <text x="275" y="508" text-anchor="middle" font-size="8.5" font-weight="800" fill="#fff" opacity="0.9">S3</text>
  <!-- text -->
  <text x="309" y="492" font-size="13" font-weight="700" fill="#f0f6ff">Amazon S3</text>
  <text x="309" y="510" font-size="10" fill="#86efac">Static Website Hosting</text>
  <text x="309" y="527" font-size="10" fill="#7fb3d3">HTML · CSS · JavaScript</text>
  <text x="309" y="544" font-size="10" fill="#7fb3d3">Origin for CloudFront OAC</text>

  <!-- ═══════════════════════════════════════════
       LAMBDA  cx=880  x=750 y=472 w=270 h=90
  ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="750" y="472" width="270" height="90" rx="12" fill="url(#card)" stroke="#fb923c" stroke-width="1.5"/>
  </g>
  <!-- icon: Lambda — orange square + λ -->
  <rect x="765" y="486" width="40" height="40" rx="7" fill="#c2410c"/>
  <text x="785" y="514" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">λ</text>
  <!-- text -->
  <text x="819" y="492" font-size="13" font-weight="700" fill="#f0f6ff">AWS Lambda</text>
  <text x="819" y="510" font-size="10" fill="#fdba74">Function URL  (no API Gateway)</text>
  <text x="819" y="527" font-size="10" fill="#7fb3d3">Python · Visitor Counter Logic</text>
  <text x="819" y="544" font-size="10" fill="#7fb3d3">Triggered on page load</text>

  <!-- Arrow Lambda → DynamoDB -->
  <line x1="885" y1="562" x2="885" y2="598" stroke="#38bdf8" stroke-width="2" marker-end="url(#ab)" opacity="0.85"/>
  <text x="894" y="583" font-size="9" fill="#38bdf8" opacity="0.65">read / write</text>

  <!-- ═══════════════════════════════════════════
       DYNAMODB  cx=880  x=750 y=600 w=270 h=90
  ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="750" y="600" width="270" height="90" rx="12" fill="url(#card)" stroke="#60a5fa" stroke-width="1.5"/>
  </g>
  <!-- icon: DynamoDB — blue square + cylinders -->
  <rect x="765" y="614" width="40" height="40" rx="7" fill="#1d4ed8"/>
  <ellipse cx="785" cy="624" rx="10" ry="3.5" fill="none" stroke="#fff" stroke-width="1.6"/>
  <line x1="775" y1="624" x2="775" y2="644" stroke="#fff" stroke-width="1.6"/>
  <line x1="795" y1="624" x2="795" y2="644" stroke="#fff" stroke-width="1.6"/>
  <ellipse cx="785" cy="644" rx="10" ry="3.5" fill="#fff" opacity="0.18" stroke="#fff" stroke-width="1.6"/>
  <ellipse cx="785" cy="631" rx="10" ry="3" fill="none" stroke="#fff" stroke-width="1" opacity="0.45"/>
  <!-- text -->
  <text x="819" y="620" font-size="13" font-weight="700" fill="#f0f6ff">Amazon DynamoDB</text>
  <text x="819" y="638" font-size="10" fill="#93c5fd">Visitor Count Table</text>
  <text x="819" y="655" font-size="10" fill="#7fb3d3">NoSQL · On-Demand capacity</text>
  <text x="819" y="672" font-size="10" fill="#7fb3d3">PK: "visits" · Count: N</text>

  <!-- ═══════════════════════════════════════════
       CI/CD PANEL  x=28 y=318 w=208 h=130
       Right edge = 236  |  CloudFront left = 355
  ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="28" y="318" width="208" height="130" rx="12" fill="url(#card)" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="6,3"/>
  </g>
  <!-- icon: GitHub — dark square + simple octocat head -->
  <rect x="40" y="330" width="34" height="34" rx="6" fill="#24292e"/>
  <!-- octocat simplified: circle head + ear nubs -->
  <circle cx="57" cy="347" r="9" fill="none" stroke="#fff" stroke-width="1.6"/>
  <circle cx="51" cy="341" r="2" fill="#24292e" stroke="#fff" stroke-width="1.2"/>
  <circle cx="63" cy="341" r="2" fill="#24292e" stroke="#fff" stroke-width="1.2"/>
  <path d="M51 352 Q57 357 63 352" fill="none" stroke="#fff" stroke-width="1.4"/>
  <!-- text -->
  <text x="82" y="337" font-size="9.5" font-weight="700" fill="#f9a8d4" letter-spacing="0.5">CI / CD PIPELINE</text>
  <text x="82" y="354" font-size="11" font-weight="600" fill="#f0f6ff">GitHub Actions</text>
  <line x1="40" y1="372" x2="224" y2="372" stroke="#f472b6" stroke-width="0.5" opacity="0.4"/>
  <text x="44" y="389" font-size="9.5" fill="#7fb3d3">→ Push triggers workflow</text>
  <text x="44" y="406" font-size="9.5" fill="#7fb3d3">→ Sync website to S3</text>
  <text x="44" y="423" font-size="9.5" fill="#fca5a5">→ Terraform plan/apply</text>
  <text x="44" y="440" font-size="9.5" fill="#fca5a5">→ CF cache invalidation</text>
  <!-- dashed arrow CI/CD → CloudFront -->
  <line x1="236" y1="362" x2="353" y2="355" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ap)" opacity="0.85"/>

  <!-- ═══════════════════════════════════════════
       TERRAFORM PANEL  x=28 y=472 w=196 h=90
       Right edge = 224  |  S3 left = 240
  ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="28" y="472" width="196" height="90" rx="12" fill="url(#card)" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6,3"/>
  </g>
  <!-- icon: Terraform — purple square + T -->
  <rect x="40" y="484" width="34" height="34" rx="6" fill="#5c4ee5"/>
  <!-- Terraform logo simplified: two stacked parallelograms -->
  <polygon points="49,490 58,494 58,506 49,502" fill="#fff" opacity="0.9"/>
  <polygon points="60,487 69,491 69,503 60,499" fill="#fff" opacity="0.55"/>
  <polygon points="49,508 58,512 58,516 49,512" fill="#fff" opacity="0.55"/>
  <!-- text -->
  <text x="84" y="492" font-size="9.5" font-weight="700" fill="#a5b4fc" letter-spacing="0.5">TERRAFORM  IaC</text>
  <text x="84" y="509" font-size="10" fill="#f0f6ff">All infra in code (HCL)</text>
  <text x="84" y="526" font-size="9.5" fill="#7fb3d3">S3 · CF · R53 · ACM</text>
  <text x="84" y="543" font-size="9.5" fill="#7fb3d3">Lambda · DynamoDB</text>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <line x1="30" y1="730" x2="1070" y2="730" stroke="#fff" stroke-width="0.5" opacity="0.07"/>
  <line x1="46" y1="748" x2="72" y2="748" stroke="#38bdf8" stroke-width="2" marker-end="url(#ab)"/>
  <text x="80" y="752" font-size="10" fill="#7fb3d3">HTTPS Request Flow</text>
  <line x1="240" y1="748" x2="266" y2="748" stroke="#f472b6" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ap)"/>
  <text x="274" y="752" font-size="10" fill="#7fb3d3">CI/CD Automation</text>
  <line x1="440" y1="748" x2="466" y2="748" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#at)"/>
  <text x="474" y="752" font-size="10" fill="#7fb3d3">ACM Certificate</text>
  <text x="760" y="752" text-anchor="middle" font-size="10" fill="#7fb3d3" opacity="0.35">resume.kevinlutes.com  ·  AWS Cloud Resume Challenge</text>
</svg>
